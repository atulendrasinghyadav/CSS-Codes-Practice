<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tap the Shrinking Circle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

    <main class="app">
      <header class="topbar card">
        <div class="stat-group">
          <p class="label">Score</p>
          <p class="value" id="score">0</p>
        </div>
        <div class="stat-group center">
          <h1>Tap the Shrinking Circle</h1>
          <p class="subtitle">Tap before it disappears. Miss once, game over.</p>
        </div>
        <div class="stat-group right">
          <p class="label">Round</p>
          <p class="value" id="round">1</p>
        </div>
      </header>

      <section class="arena-wrap card">
        <div class="hud">
          <p id="status">Press Start to play</p>
          <button id="startBtn" class="btn" type="button">Start Game</button>
        </div>

        <div id="arena" class="arena" aria-label="Game Arena">
          <button
            id="circle"
            class="circle hidden"
            aria-label="Tap the circle"
            type="button"
          ></button>

          <div id="pulse" class="pulse hidden" aria-hidden="true"></div>

          <div id="overlay" class="overlay">
            <div class="overlay-card">
              <h2 id="overlayTitle">Ready?</h2>
              <p id="overlayText">Tap start to begin your reflex challenge.</p>
              <button id="overlayBtn" class="btn" type="button">Start</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>

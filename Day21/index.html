<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Testimonial Card</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Google Fonts for Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div id="responsive-card" class="card desktop">

            <div class="card-image"></div>


            <div class="card-content">
                <h2>Jess Wilson</h2>
                <h3>UX Engineer</h3>
                <p>Empowering users through captivating interfaces, turning ideas into pixel-perfect realities.</p>
                <div class="actions">
                    <button class="btn-outline">Profile</button>
                    <button class="btn-solid">Follow</button>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>

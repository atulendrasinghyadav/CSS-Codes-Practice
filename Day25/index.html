<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Cart Button</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <button class="cart-btn" id="cartBtn">
    <!-- Cart SVG Icon — moves across the button -->
    <span class="cart-icon" id="cartIcon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" 
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="9" cy="21" r="1.5" fill="currentColor"/>
        <circle cx="20" cy="21" r="1.5" fill="currentColor"/>
      </svg>

      <!-- T-shirt item that drops into the cart -->
      <span class="item-ball" id="itemBall">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 3h-2a2 2 0 0 1-4 0H8L2 7l2 2 3-2v13h10V7l3 2 2-2-6-4z" 
                fill="#fbbf24" stroke="#f59e0b" stroke-width="0.8" stroke-linejoin="round"/>
        </svg>
      </span>
    </span>

    <!-- The text label that gets wiped away -->
    <span class="btn-text" id="btnText">Add to Cart</span>

    <!-- Success content that appears after animation -->
    <span class="btn-success" id="btnSuccess">
      <svg class="check-svg" viewBox="0 0 24 24" fill="none">
        <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Added</span>
    </span>
  </button>

  <script src="script.js"></script>
</body>
</html>

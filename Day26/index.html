<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Block Racing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Orbitron:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>

    <main class="app">
      <header class="top-bar glass">
        <div>
          <p class="kicker">Arcade</p>
          <h1>Neon Block Racing</h1>
        </div>

        <div class="stats">
          <div class="stat-pill">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat-pill">
            <span>Best</span>
            <strong id="best">0</strong>
          </div>
          <div class="stat-pill">
            <span>Speed</span>
            <strong id="speed">1.0x</strong>
          </div>
        </div>
      </header>

      <section class="game-shell glass">
        <div class="road-wrap">
          <div id="road" class="road">
            <div class="lane-lines"></div>
            <div id="player" class="car player"></div>
          </div>

          <div id="startOverlay" class="overlay">
            <div class="overlay-card">
              <h2>Ready To Race?</h2>
              <p>
                Move with <kbd>←</kbd> <kbd>→</kbd> or <kbd>A</kbd> <kbd>D</kbd>. Avoid incoming
                neon blocks. Survive and score big.
              </p>
              <button id="startBtn" class="btn-primary">Start Race</button>
            </div>
          </div>

          <div id="gameOverOverlay" class="overlay hidden">
            <div class="overlay-card">
              <h2>Crashed!</h2>
              <p>
                Final Score: <strong id="finalScore">0</strong>
              </p>
              <button id="restartBtn" class="btn-primary">Race Again</button>
            </div>
          </div>
        </div>

        <div class="side-panel">
          <h3>Controls</h3>
          <ul>
            <li><span>Desktop</span> ← → / A D</li>
            <li><span>Pause</span> Space</li>
            <li><span>Touch</span> Use on-screen arrows</li>
          </ul>

          <div class="touch-controls" aria-label="Touch controls">
            <button id="leftBtn" class="touch-btn" aria-label="Move left">◄</button>
            <button id="rightBtn" class="touch-btn" aria-label="Move right">►</button>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
